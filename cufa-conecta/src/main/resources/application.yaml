server:
  port: 8080

spring:
  docker:
    compose:
      # Desligado: use Redis/Rabbit/MySQL já rodando na máquina (sem depender do CLI Docker).
      enabled: false
  cache:
    # simple = cache em memória (não exige Redis). Para produção com Redis, use type: redis e suba o serviço.
    type: simple
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
  redis:
    host: localhost
    port: 6379
  datasource:
    url: jdbc:mysql://localhost:3306/cufaconecta
    username: admCufa
    password: cufaConecta@2025
  jackson:
    default-property-inclusion: non_null
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Schema já existente sem flyway_schema_history (ex.: script manual): baseline na V6 = não reexecuta V1–V6.
    baseline-on-migrate: true
    baseline-version: 6
  rabbitmq:
    host: localhost
    port: 5672
    username: myuser
    password: secret

jwt:
  # Duração do token em SEGUNDOS (604800 = 7 dias). Reduz “sair sozinho” em dev; em produção ajuste conforme política.
  validity: 604800
  secret: RXhpc3RlIHVtYSB0ZW9yaWEgcXVlIGRpeiBxdWUsIHNlIHVtIGRpYSBhbGd16W0gZGVzY29icmlyIGV4YX]
